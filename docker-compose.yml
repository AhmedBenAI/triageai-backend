version: "3.9"

services:

  # ── Backend API ──────────────────────────────────────────────────────────────
  triageai-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: triageai-backend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Nginx proxies from http://localhost so that is the allowed origin
      CORS_ORIGIN: http://localhost
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-20}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Angular frontend (nginx) ─────────────────────────────────────────────────
  triageai-frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    container_name: triageai-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      triageai-backend:
        condition: service_healthy
